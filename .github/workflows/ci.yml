name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Set up Android-compatible shell tests
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends busybox-static shellcheck
          mkdir -p "$RUNNER_TEMP/dncs-bin"
          ln -s "$(command -v busybox)" "$RUNNER_TEMP/dncs-bin/sh"
          echo "$RUNNER_TEMP/dncs-bin" >> "$GITHUB_PATH"
          echo "DNCS_TEST_SH=$RUNNER_TEMP/dncs-bin/sh" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Run Web and metadata tests
        run: |
          npm run typecheck
          npx vitest run
          node scripts/check-lf.mjs
          node scripts/verify-update.mjs

      - name: Run Android ash fault stubs
        run: sh tests/shell/core_stub_test.sh

      - name: Build and verify package
        run: |
          npm run package
          npm run verify:package

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Check shell scripts
        run: |
          shellcheck --severity=warning module/*.sh module/scripts/core.sh tests/shell/core_stub_test.sh
