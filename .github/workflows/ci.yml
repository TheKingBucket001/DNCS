name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Build and verify package
        run: |
          npm run package
          npm run verify:package

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Check shell scripts
        run: |
          shellcheck module/*.sh module/scripts/core.sh tests/shell/core_stub_test.sh tools/dncs-compat-check.sh
          sh -n tools/dncs-compat-check.sh
